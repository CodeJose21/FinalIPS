apiVersion: v1
kind: Pod
metadata:
  name: liveness-nginx
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 3

---

apiVersion: v1
kind: Pod
metadata:
  name: liveness-exec
spec:
  containers:
    - name: busybox
      image: busybox
      command:
        - sh
        - -c
        - "touch /tmp/healthy; sleep 30; rm /tmp/healthy; sleep 600"
      livenessProbe:
        exec:
          command:
            - test
            - -f
            - /tmp/healthy
        initialDelaySeconds: 5
        periodSeconds: 5
  restartPolicy: Always