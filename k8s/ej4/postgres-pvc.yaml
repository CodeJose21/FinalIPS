apiVersion: v1
kind: PersistentVolumeClaim
metadata:
 name: postgres-pvc
spec:
 accessModes:
 - ReadWriteOnce
 resources:
  requests:
    storage: 1Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: postgres-pvc
  name: postgres-pvc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-pvc
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: postgres-pvc
    spec:
      containers:
      - image: postgres:alpine
        name: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources: {}
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
status: {}

---

apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    app: postgres-deployment
  name: postgres-deployment
spec:
  ports:
  - port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    app: postgres-deployment
  type: ClusterIP
status:
  loadBalancer: {}
