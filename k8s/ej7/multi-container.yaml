apiVersion: v1
kind: Pod
metadata:
  name: web-sidecar
spec:
  containers:
    - name: content-generator
      image: busybox
      command:
        - sh
        - -c
        - |
          while true; do
            date > /shared/index.html
            sleep 5
          done
      volumeMounts:
        - name: shared-data
          mountPath: /shared

    - name: web-server
      image: nginx:alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: shared-data
          mountPath: /usr/share/nginx/html

  volumes:
    - name: shared-data
      emptyDir: {}
