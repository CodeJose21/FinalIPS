apiVersion: v1
kind: Pod
metadata:
  creationTimestamp: null
  labels:
    run: memory-pod
  name: memory-pod
spec:
  containers:
  - image: polinux/stress
    name: memory-pod
    resources:
      requests:
        memory: "50Mi"
      limits:
        memory: "100Mi"
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
  dnsPolicy: ClusterFirst
  restartPolicy: Always
status: {}

