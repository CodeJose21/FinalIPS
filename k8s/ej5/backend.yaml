apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: backend-app:1.0
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              value: postgres-service
            - name: DB_NAME
              value: appdb
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: secret
          ports:
            - containerPort: 5000

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP