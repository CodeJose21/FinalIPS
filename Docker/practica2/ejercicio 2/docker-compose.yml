services:
  db:
    image: postgres:15
    container_name: mi-db
    environment:
      POSTGRES_PASSWORD: secretpassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1m30s
      timeout: 30s
      retries: 3

  wb:
    image: adminer
    container_name: mi-wb
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy