name: Docker Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_FULL_NAME: ${{ vars.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}

jobs:
  build-and-publish:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_FULL_NAME }}:latest
            ${{ env.IMAGE_FULL_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build-and-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/ --namespace=${{ vars.NAMESPACE }}

      - name: Update Kubernetes deployment image
        run: kubectl set image deployment/${{ vars.DEPLOYMENT_NAME }} ${{ vars.CONTAINER_NAME }}=${{ env.IMAGE_FULL_NAME }}:${{ github.sha }} --namespace=${{ vars.NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ vars.DEPLOYMENT_NAME }} --namespace=${{ vars.NAMESPACE }} --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get deployments --namespace=${{ vars.NAMESPACE }}
          kubectl get pods --namespace=${{ vars.NAMESPACE }}
          kubectl get services --namespace=${{ vars.NAMESPACE }}